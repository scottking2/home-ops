apiVersion: v1
data:
  cost-overview.json: '{"uid": "cost-overview-sk", "title": "Cost Overview", "tags": ["teslamate", "cost"], "timezone": "browser", "schemaVersion": 39, "version": 2, "refresh": "1h", "time": {"from": "now-1y", "to": "now"}, "templating": {"list": [{"name": "car_id", "label": "Car", "type": "query", "datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "query": "SELECT id as __value, COALESCE(name, RIGHT(vin,6)) as __text FROM cars ORDER BY display_priority ASC, name ASC, vin ASC;", "refresh": 1, "includeAll": false, "multi": false, "sort": 0}, {"name": "gas_price", "label": "Gas Price ($/gal)", "type": "custom", "query": "3.00,3.25,3.50,3.75,4.00,4.25,4.50,4.75,5.00", "current": {"value": "3.50", "text": "3.50"}, "options": [{"value": "3.0", "text": "3.0"}, {"value": "3.25", "text": "3.25"}, {"value": "3.5", "text": "3.5"}, {"value": "3.75", "text": "3.75"}, {"value": "4.0", "text": "4.0"}, {"value": "4.25", "text": "4.25"}, {"value": "4.5", "text": "4.5"}, {"value": "4.75", "text": "4.75"}, {"value": "5.0", "text": "5.0"}], "includeAll": false, "multi": false}]}, "annotations": {"list": []}, "panels": [{"id": 1, "title": "\ud83d\udcb0 Key Cost Metrics", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}, "panels": []}, {"id": 2, "title": "Total Charging Cost", "type": "stat", "gridPos": {"x": 0, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost), 0) FROM charging_processes\n    WHERE car_id = $car_id AND $__timeFilter(end_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 3, "title": "Cost This Month", "type": "stat", "gridPos": {"x": 6, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost), 0) FROM charging_processes\n    WHERE car_id = $car_id\n      AND date_trunc(''month'', end_date) = date_trunc(''month'', NOW())", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 4, "title": "\u00d8 Cost per kWh", "type": "stat", "gridPos": {"x": 12, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost)/NULLIF(SUM(charge_energy_added),0), 0)\n    FROM charging_processes\n    WHERE car_id = $car_id AND $__timeFilter(end_date) AND cost IS NOT NULL", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 5, "title": "\u00d8 Cost per 100 Miles (Actual)", "type": "stat", "gridPos": {"x": 18, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (\n        SELECT COALESCE(SUM(cost),0) AS total_cost\n        FROM charging_processes\n        WHERE car_id = $car_id AND $__timeFilter(end_date) AND cost IS NOT NULL\n    ),\n    miles AS (\n        SELECT COALESCE(SUM(distance)/1.60934, 1) AS total_miles\n        FROM drives\n        WHERE car_id = $car_id AND $__timeFilter(start_date)\n    )\n    SELECT total_cost / total_miles * 100 FROM costs, miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 6, "title": "Total kWh Charged", "type": "stat", "gridPos": {"x": 0, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "kwh", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(charge_energy_added), 0) FROM charging_processes\n    WHERE car_id = $car_id AND $__timeFilter(end_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 7, "title": "Total Miles Driven", "type": "stat", "gridPos": {"x": 6, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "mi", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(distance)/1.60934, 0)::int FROM drives\n    WHERE car_id = $car_id AND $__timeFilter(start_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 8, "title": "\u00d8 kWh per 100 Miles", "type": "stat", "gridPos": {"x": 12, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "kwh", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH kwh AS (\n        SELECT COALESCE(SUM(charge_energy_added),0) AS total_kwh\n        FROM charging_processes\n        WHERE car_id = $car_id AND $__timeFilter(end_date)\n    ),\n    miles AS (\n        SELECT COALESCE(SUM(distance)/1.60934, 1) AS total_miles\n        FROM drives WHERE car_id = $car_id AND $__timeFilter(start_date)\n    )\n    SELECT total_kwh / total_miles * 100 FROM kwh, miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 9, "title": "AC vs DC Cost Split", "type": "stat", "gridPos": {"x": 18, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH ac AS (\n        SELECT COALESCE(SUM(cp.cost),0) as ac_cost\n        FROM charging_processes cp\n        JOIN charges c ON c.charging_process_id = cp.id\n        WHERE cp.car_id = $car_id AND $__timeFilter(cp.end_date)\n          AND c.fast_charger_present IS NOT true AND cp.cost IS NOT NULL\n    ),\n    dc AS (\n        SELECT COALESCE(SUM(cp.cost),0) as dc_cost\n        FROM charging_processes cp\n        JOIN charges c ON c.charging_process_id = cp.id\n        WHERE cp.car_id = $car_id AND $__timeFilter(cp.end_date)\n          AND c.fast_charger_present IS true AND cp.cost IS NOT NULL\n    )\n    SELECT ROUND(a.ac_cost,2) as \"AC (Home)\", ROUND(d.dc_cost,2) as \"DC (Fast)\"\n    FROM ac a, dc d", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 10, "title": "\ud83d\udcc8 Cost Trends Over Time", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 9, "w": 24, "h": 1}, "panels": []}, {"id": 11, "title": "Monthly Charging Cost", "type": "timeseries", "gridPos": {"x": 0, "y": 10, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT\n        date_trunc(''month'', end_date) AS time,\n        SUM(cost) AS \"Monthly Cost\"\n    FROM charging_processes\n    WHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL\n    GROUP BY 1 ORDER BY 1", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 12, "title": "Cumulative Total Cost", "type": "timeseries", "gridPos": {"x": 12, "y": 10, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT\n        end_date AS time,\n        SUM(cost) OVER (ORDER BY end_date) AS \"Cumulative Cost\"\n    FROM charging_processes\n    WHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL\n    ORDER BY end_date", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 13, "title": "Cost per Charge Session", "type": "timeseries", "gridPos": {"x": 0, "y": 18, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT\n        end_date AS time,\n        cost AS \"Session Cost\"\n    FROM charging_processes\n    WHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL\n    ORDER BY end_date", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 14, "title": "Rolling Cost per kWh (30-day avg)", "type": "timeseries", "gridPos": {"x": 12, "y": 18, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT\n        end_date AS time,\n        AVG(cost/NULLIF(charge_energy_added,0)) OVER (\n            ORDER BY end_date ROWS BETWEEN 29 PRECEDING AND CURRENT ROW\n        ) AS \"30-Day Avg $/kWh\"\n    FROM charging_processes\n    WHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL\n    ORDER BY end_date", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 20, "title": "\ud83d\udccd Cost Breakdown", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 26, "w": 24, "h": 1}, "panels": []}, {"id": 21, "title": "Cost by Charge Location", "type": "barchart", "gridPos": {"x": 0, "y": 27, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1, "fillOpacity": 80}}, "overrides": []}, "options": {"orientation": "horizontal", "xTickLabelRotation": 0, "legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT\n        COALESCE(g.name,\n            CONCAT_WS('', '', COALESCE(a.name, a.road), a.city),\n            ''Unknown'') AS \"Location\",\n        ROUND(SUM(cp.cost)::numeric, 2) AS \"Total Cost\"\n    FROM charging_processes cp\n    LEFT JOIN addresses a ON a.id = cp.address_id\n    LEFT JOIN geofences g ON g.id = cp.geofence_id\n    WHERE cp.car_id = $car_id AND $__timeFilter(cp.end_date) AND cp.cost IS NOT NULL\n    GROUP BY 1 ORDER BY 2 DESC LIMIT 15", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 22, "title": "Monthly kWh Charged", "type": "barchart", "gridPos": {"x": 12, "y": 27, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "kwh", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1, "fillOpacity": 80}}, "overrides": []}, "options": {"orientation": "horizontal", "xTickLabelRotation": 0, "legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT\n        date_trunc(''month'', end_date) AS \"Month\",\n        ROUND(SUM(charge_energy_added)::numeric, 1) AS \"kWh\"\n    FROM charging_processes\n    WHERE car_id = $car_id AND end_date IS NOT NULL\n    GROUP BY 1 ORDER BY 1", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 30, "title": "\ud83d\udd0b Charge Session Detail", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 35, "w": 24, "h": 1}, "panels": []}, {"id": 31, "title": "All Charging Sessions with Cost", "type": "table", "gridPos": {"x": 0, "y": 36, "w": 24, "h": 10}, "fieldConfig": {"defaults": {"custom": {"filterable": true}}, "overrides": [{"matcher": {"id": "byName", "options": "cost"}, "properties": [{"id": "unit", "value": "currencyUSD"}]}, {"matcher": {"id": "byName", "options": "kwh"}, "properties": [{"id": "unit", "value": "kwh"}]}]}, "options": {"sortBy": [{"displayName": "date", "desc": true}], "footer": {"show": false}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT\n        end_date AS \"date\",\n        COALESCE(g.name,\n            CONCAT_WS('', '', COALESCE(a.name, a.road), a.city),\n            ''Home'') AS \"location\",\n        ROUND(charge_energy_added::numeric, 2) AS \"kwh\",\n        ROUND(cost::numeric, 2) AS \"cost\",\n        ROUND((cost/NULLIF(charge_energy_added,0))::numeric, 4) AS \"$/kWh\",\n        ROUND((duration_min/60.0)::numeric, 1) AS \"hours\"\n    FROM charging_processes cp\n    LEFT JOIN addresses a ON a.id = cp.address_id\n    LEFT JOIN geofences g ON g.id = cp.geofence_id\n    WHERE cp.car_id = $car_id AND $__timeFilter(end_date) AND cp.cost IS NOT NULL\n    ORDER BY end_date DESC", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 40, "title": "\u26fd Gas Car Comparison (30 MPG)", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 47, "w": 24, "h": 1}, "panels": []}, {"id": 41, "title": "Gas Car Equivalent Cost", "description": "What you would have paid driving a 30 MPG gas car at the selected gas price", "type": "stat", "gridPos": {"x": 0, "y": 48, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH miles AS (\n    SELECT COALESCE(SUM(distance)/1.60934, 0) AS total_miles\n    FROM drives WHERE car_id = $car_id AND $__timeFilter(start_date)\n)\nSELECT ROUND((total_miles / 30.0 * $gas_price)::numeric, 2) FROM miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 42, "title": "$ Saved vs 30 MPG Gas Car", "description": "Total savings compared to driving a 30 MPG gas car", "type": "stat", "gridPos": {"x": 6, "y": 48, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (\n    SELECT COALESCE(SUM(cost), 0) AS total_cost FROM charging_processes\n    WHERE car_id = $car_id AND $__timeFilter(end_date) AND cost IS NOT NULL\n),\nmiles AS (\n    SELECT COALESCE(SUM(distance)/1.60934, 0) AS total_miles FROM drives\n    WHERE car_id = $car_id AND $__timeFilter(start_date)\n)\nSELECT ROUND(((total_miles / 30.0 * $gas_price) - total_cost)::numeric, 2) FROM costs, miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 43, "title": "% Savings vs Gas", "description": "Percentage saved compared to a 30 MPG gas car", "type": "stat", "gridPos": {"x": 12, "y": 48, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (\n    SELECT COALESCE(SUM(cost), 0) AS total_cost FROM charging_processes\n    WHERE car_id = $car_id AND $__timeFilter(end_date) AND cost IS NOT NULL\n),\nmiles AS (\n    SELECT COALESCE(SUM(distance)/1.60934, 1) AS total_miles FROM drives\n    WHERE car_id = $car_id AND $__timeFilter(start_date)\n)\nSELECT ROUND(\n    (1 - total_cost / NULLIF(total_miles / 30.0 * $gas_price, 0)) * 100, 1\n) FROM costs, miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 44, "title": "Gas Cost This Month (30 MPG equivalent)", "type": "stat", "gridPos": {"x": 18, "y": 48, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH miles AS (\n    SELECT COALESCE(SUM(distance)/1.60934, 0) AS total_miles FROM drives\n    WHERE car_id = $car_id AND date_trunc(''month'', start_date) = date_trunc(''month'', NOW())\n)\nSELECT ROUND((total_miles / 30.0 * $gas_price)::numeric, 2) FROM miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 45, "title": "Cumulative Savings vs Gas Car (30 MPG)", "type": "timeseries", "gridPos": {"x": 0, "y": 52, "w": 24, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "WITH monthly AS (\n    SELECT\n        date_trunc(''month'', d.start_date) AS month,\n        SUM(d.distance)/1.60934 AS miles\n    FROM drives d\n    WHERE car_id = $car_id AND d.start_date IS NOT NULL\n    GROUP BY 1\n),\ncharging AS (\n    SELECT\n        date_trunc(''month'', end_date) AS month,\n        SUM(cost) AS elec_cost\n    FROM charging_processes\n    WHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL\n    GROUP BY 1\n)\nSELECT\n    month AS time,\n    SUM((miles / 30.0 * $gas_price) - COALESCE(elec_cost, 0)) OVER (ORDER BY month) AS \"Cumulative Savings\"\nFROM monthly m\nLEFT JOIN charging c USING (month)\nWHERE $__timeFilter(month)\nORDER BY month", "refId": "A"}, {"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "WITH monthly AS (\n    SELECT\n        date_trunc(''month'', d.start_date) AS month,\n        SUM(d.distance)/1.60934 AS miles\n    FROM drives d\n    WHERE car_id = $car_id AND d.start_date IS NOT NULL\n    GROUP BY 1\n)\nSELECT\n    month AS time,\n    SUM(miles / 30.0 * $gas_price) OVER (ORDER BY month) AS \"Cumulative Gas Cost\"\nFROM monthly\nWHERE $__timeFilter(month)\nORDER BY month", "refId": "B"}, {"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT\n    end_date AS time,\n    SUM(cost) OVER (ORDER BY end_date) AS \"Cumulative Electricity Cost\"\nFROM charging_processes\nWHERE car_id = $car_id AND cost IS NOT NULL AND end_date IS NOT NULL AND $__timeFilter(end_date)\nORDER BY end_date", "refId": "C"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}]}'
