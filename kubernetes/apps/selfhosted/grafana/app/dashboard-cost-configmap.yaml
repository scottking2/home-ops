apiVersion: v1
data:
  cost-overview.json: '{"uid": "cost-overview-sk", "title": "Cost Overview", "tags": ["teslamate", "cost"], "timezone": "browser", "schemaVersion": 39, "version": 3, "refresh": "1h", "time": {"from": "now-6M", "to": "now"}, "templating": {"list": [{"name": "car_id", "label": "Car", "type": "query", "datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "query": "SELECT id as __value, COALESCE(name, RIGHT(vin,6)) as __text FROM cars ORDER BY display_priority ASC, name ASC, vin ASC;", "refresh": 1, "includeAll": false, "multi": false, "sort": 0}, {"name": "gas_price", "label": "Gas Price ($/gal)", "type": "custom", "query": "3.00,3.25,3.50,3.75,4.00,4.25,4.50,4.75,5.00", "current": {"value": "3.50", "text": "3.50"}, "options": [{"value": "3.0", "text": "3.0"}, {"value": "3.25", "text": "3.25"}, {"value": "3.5", "text": "3.5"}, {"value": "3.75", "text": "3.75"}, {"value": "4.0", "text": "4.0"}, {"value": "4.25", "text": "4.25"}, {"value": "4.5", "text": "4.5"}, {"value": "4.75", "text": "4.75"}, {"value": "5.0", "text": "5.0"}], "includeAll": false, "multi": false}]}, "annotations": {"list": []}, "panels": [{"id": 1, "title": "\ud83d\udcb0 Cost Summary", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}, "panels": []}, {"id": 2, "title": "\u26a1 Total Electricity Cost", "description": "", "type": "stat", "gridPos": {"x": 0, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost), 0) FROM charging_processes WHERE car_id = $car_id AND $__timeFilter(end_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 3, "title": "\u26fd Gas Equivalent (30 MPG)", "description": "", "type": "stat", "gridPos": {"x": 6, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH miles AS (SELECT COALESCE(SUM(distance)/1.60934,0) AS m FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date))\nSELECT ROUND((m/30.0*$gas_price)::numeric,2) FROM miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 4, "title": "\ud83d\udc9a $ Saved vs Gas", "description": "", "type": "stat", "gridPos": {"x": 12, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (SELECT COALESCE(SUM(cost),0) AS c FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date) AND cost IS NOT NULL),\nmiles AS (SELECT COALESCE(SUM(distance)/1.60934,0) AS m FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date))\nSELECT ROUND(((m/30.0*$gas_price)-c)::numeric,2) FROM costs,miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 5, "title": "\ud83d\udcc9 % Savings vs Gas", "type": "stat", "gridPos": {"x": 18, "y": 1, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (SELECT COALESCE(SUM(cost),0) AS c FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date) AND cost IS NOT NULL),\nmiles AS (SELECT COALESCE(SUM(distance)/1.60934,1) AS m FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date))\nSELECT ROUND((1-c/NULLIF(m/30.0*$gas_price,0))*100,1) FROM costs,miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 6, "title": "\u26a1 Electric Cost This Month", "description": "", "type": "stat", "gridPos": {"x": 0, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost),0) FROM charging_processes WHERE car_id=$car_id AND date_trunc(''month'',end_date)=date_trunc(''month'',NOW())", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 7, "title": "\u26fd Gas Cost This Month (30 MPG)", "description": "", "type": "stat", "gridPos": {"x": 6, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH miles AS (SELECT COALESCE(SUM(distance)/1.60934,0) AS m FROM drives WHERE car_id=$car_id AND date_trunc(''month'',start_date)=date_trunc(''month'',NOW()))\nSELECT ROUND((m/30.0*$gas_price)::numeric,2) FROM miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 8, "title": "\u00d8 Cost per kWh", "description": "", "type": "stat", "gridPos": {"x": 12, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(cost)/NULLIF(SUM(charge_energy_added),0),0) FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date) AND cost IS NOT NULL", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 9, "title": "\u00d8 Cost per 100 Miles (Actual)", "description": "", "type": "stat", "gridPos": {"x": 18, "y": 5, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH costs AS (SELECT COALESCE(SUM(cost),0) AS c FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date) AND cost IS NOT NULL),\nmiles AS (SELECT COALESCE(SUM(distance)/1.60934,1) AS m FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date))\nSELECT c/m*100 FROM costs,miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 10, "title": "Total kWh Charged", "description": "", "type": "stat", "gridPos": {"x": 0, "y": 9, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "kwh", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(charge_energy_added),0) FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 11, "title": "Total Miles Driven", "description": "", "type": "stat", "gridPos": {"x": 6, "y": 9, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "mi", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(SUM(distance)/1.60934,0)::int FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date)", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 12, "title": "\u00d8 kWh per 100 Miles", "description": "", "type": "stat", "gridPos": {"x": 12, "y": 9, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "kwh", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH kwh AS (SELECT COALESCE(SUM(charge_energy_added),0) AS k FROM charging_processes WHERE car_id=$car_id AND $__timeFilter(end_date)),\nmiles AS (SELECT COALESCE(SUM(distance)/1.60934,1) AS m FROM drives WHERE car_id=$car_id AND $__timeFilter(start_date))\nSELECT k/m*100 FROM kwh,miles", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 13, "title": "AC vs DC Cost Split", "type": "stat", "gridPos": {"x": 18, "y": 9, "w": 6, "h": 4}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "mappings": []}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "auto"}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "WITH ac AS (SELECT COALESCE(SUM(cp.cost),0) as ac_cost FROM charging_processes cp JOIN charges c ON c.charging_process_id=cp.id WHERE cp.car_id=$car_id AND $__timeFilter(cp.end_date) AND c.fast_charger_present IS NOT true AND cp.cost IS NOT NULL),\ndc AS (SELECT COALESCE(SUM(cp.cost),0) as dc_cost FROM charging_processes cp JOIN charges c ON c.charging_process_id=cp.id WHERE cp.car_id=$car_id AND $__timeFilter(cp.end_date) AND c.fast_charger_present IS true AND cp.cost IS NOT NULL)\nSELECT ROUND(a.ac_cost,2) as \"AC (Home)\", ROUND(d.dc_cost,2) as \"DC (Fast)\" FROM ac a, dc d", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 20, "title": "\ud83d\udcc8 Cost Trends Over Time", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 13, "w": 24, "h": 1}, "panels": []}, {"id": 21, "title": "Monthly Cost: Electric vs Gas (30 MPG equivalent)", "type": "timeseries", "gridPos": {"x": 0, "y": 14, "w": 24, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 60, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT date_trunc(''month'',end_date) AS time, SUM(cost) AS \"\u26a1 Electric Cost\"\nFROM charging_processes WHERE car_id=$car_id AND cost IS NOT NULL AND end_date IS NOT NULL\nGROUP BY 1 ORDER BY 1", "refId": "A"}, {"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT date_trunc(''month'',start_date) AS time, SUM(distance)/1.60934/30.0*$gas_price AS \"\u26fd Gas Equivalent\"\nFROM drives WHERE car_id=$car_id AND start_date IS NOT NULL\nGROUP BY 1 ORDER BY 1", "refId": "B"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 22, "title": "Cumulative: Electric Cost vs Gas Cost vs Savings", "type": "timeseries", "gridPos": {"x": 0, "y": 22, "w": 24, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT end_date AS time, SUM(cost) OVER (ORDER BY end_date) AS \"\u26a1 Cumulative Electric\"\nFROM charging_processes WHERE car_id=$car_id AND cost IS NOT NULL AND end_date IS NOT NULL AND $__timeFilter(end_date)\nORDER BY end_date", "refId": "A"}, {"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "WITH monthly AS (SELECT date_trunc(''month'',start_date) AS month, SUM(distance)/1.60934 AS miles FROM drives WHERE car_id=$car_id AND start_date IS NOT NULL GROUP BY 1)\nSELECT month AS time, SUM(miles/30.0*$gas_price) OVER (ORDER BY month) AS \"\u26fd Cumulative Gas\"\nFROM monthly WHERE $__timeFilter(month) ORDER BY month", "refId": "B"}, {"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "WITH monthly AS (SELECT date_trunc(''month'',d.start_date) AS month, SUM(d.distance)/1.60934 AS miles FROM drives d WHERE car_id=$car_id AND d.start_date IS NOT NULL GROUP BY 1),\ncharging AS (SELECT date_trunc(''month'',end_date) AS month, SUM(cost) AS elec_cost FROM charging_processes WHERE car_id=$car_id AND cost IS NOT NULL AND end_date IS NOT NULL GROUP BY 1)\nSELECT month AS time, SUM((miles/30.0*$gas_price)-COALESCE(elec_cost,0)) OVER (ORDER BY month) AS \"\ud83d\udc9a Cumulative Savings\"\nFROM monthly m LEFT JOIN charging c USING (month) WHERE $__timeFilter(month) ORDER BY month", "refId": "C"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 30, "title": "\ud83d\udd0b Charging Details", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 30, "w": 24, "h": 1}, "panels": []}, {"id": 31, "title": "Cost per Charge Session", "type": "timeseries", "gridPos": {"x": 0, "y": 31, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT end_date AS time, cost AS \"Session Cost\" FROM charging_processes WHERE car_id=$car_id AND cost IS NOT NULL AND end_date IS NOT NULL AND $__timeFilter(end_date) ORDER BY end_date", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 32, "title": "Rolling Cost per kWh (30-day avg)", "type": "timeseries", "gridPos": {"x": 12, "y": 31, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto"}}, "overrides": []}, "options": {"tooltip": {"mode": "single"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "time_series", "rawSql": "SELECT end_date AS time, AVG(cost/NULLIF(charge_energy_added,0)) OVER (ORDER BY end_date ROWS BETWEEN 29 PRECEDING AND CURRENT ROW) AS \"30-Day Avg $/kWh\"\nFROM charging_processes WHERE car_id=$car_id AND cost IS NOT NULL AND end_date IS NOT NULL AND $__timeFilter(end_date) ORDER BY end_date", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 40, "title": "\ud83d\udccd Cost Breakdown", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 39, "w": 24, "h": 1}, "panels": []}, {"id": 41, "title": "Cost by Charge Location", "type": "barchart", "gridPos": {"x": 0, "y": 40, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "currencyUSD", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1, "fillOpacity": 80}}, "overrides": []}, "options": {"orientation": "horizontal", "xTickLabelRotation": 0, "legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT COALESCE(g.name,CONCAT_WS('', '',COALESCE(a.name,a.road),a.city),''Unknown'') AS \"Location\",\nROUND(SUM(cp.cost)::numeric,2) AS \"Total Cost\"\nFROM charging_processes cp\nLEFT JOIN addresses a ON a.id=cp.address_id\nLEFT JOIN geofences g ON g.id=cp.geofence_id\nWHERE cp.car_id=$car_id AND $__timeFilter(cp.end_date) AND cp.cost IS NOT NULL\nGROUP BY 1 ORDER BY 2 DESC LIMIT 15", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 42, "title": "Monthly kWh Charged", "type": "barchart", "gridPos": {"x": 12, "y": 40, "w": 12, "h": 8}, "fieldConfig": {"defaults": {"unit": "kwh", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1, "fillOpacity": 80}}, "overrides": []}, "options": {"orientation": "horizontal", "xTickLabelRotation": 0, "legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT date_trunc(''month'',end_date) AS \"Month\", ROUND(SUM(charge_energy_added)::numeric,1) AS \"kWh\"\nFROM charging_processes WHERE car_id=$car_id AND end_date IS NOT NULL\nGROUP BY 1 ORDER BY 1", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}, {"id": 50, "title": "\ud83d\udd0c Charge Session Detail", "type": "row", "collapsed": false, "gridPos": {"x": 0, "y": 48, "w": 24, "h": 1}, "panels": []}, {"id": 51, "title": "All Charging Sessions with Cost", "type": "table", "gridPos": {"x": 0, "y": 49, "w": 24, "h": 10}, "fieldConfig": {"defaults": {"custom": {"filterable": true}}, "overrides": [{"matcher": {"id": "byName", "options": "cost"}, "properties": [{"id": "unit", "value": "currencyUSD"}]}, {"matcher": {"id": "byName", "options": "kwh"}, "properties": [{"id": "unit", "value": "kwh"}]}]}, "options": {"sortBy": [{"displayName": "date", "desc": true}], "footer": {"show": false}}, "targets": [{"datasource": {"type": "postgres", "uid": "teslamate_postgres"}, "format": "table", "rawSql": "SELECT end_date AS \"date\",\nCOALESCE(g.name,CONCAT_WS('', '',COALESCE(a.name,a.road),a.city),''Home'') AS \"location\",\nROUND(charge_energy_added::numeric,2) AS \"kwh\",\nROUND(cost::numeric,2) AS \"cost\",\nROUND((cost/NULLIF(charge_energy_added,0))::numeric,4) AS \"$/kWh\",\nROUND((duration_min/60.0)::numeric,1) AS \"hours\"\nFROM charging_processes cp\nLEFT JOIN addresses a ON a.id=cp.address_id\nLEFT JOIN geofences g ON g.id=cp.geofence_id\nWHERE cp.car_id=$car_id AND $__timeFilter(end_date) AND cp.cost IS NOT NULL\nORDER BY end_date DESC", "refId": "A"}], "datasource": {"type": "postgres", "uid": "teslamate_postgres"}}]}'
kind: ConfigMap
metadata:
  labels:
