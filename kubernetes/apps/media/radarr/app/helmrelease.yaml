---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/radarr
              tag: latest
            env:
              TZ: America/Denver
              PUID: "568"
              PGID: "568"
            ports:
              - name: http
                containerPort: &port 7878
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    ingress:
      main:
        enabled: true
        className: internal
        hosts:
          - host: &host "radarr.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: iscsi-csi
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      downloads:
        type: nfs
        server: ${SECRET_NFS_SERVER}
        path: /volume1/arr-downloads
        globalMounts:
          - path: /downloads
      media:
        type: nfs
        server: ${SECRET_NFS_SERVER}
        path: /volume1/Media
        globalMounts:
          - path: /media
