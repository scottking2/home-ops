---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      mosquitto:
        replicas: 1
        strategy: RollingUpdate
        initContainers:
          init-passwd:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                username="$(cat /mosquitto/auth/username)"
                password="$(cat /mosquitto/auth/password)"
                mosquitto_passwd -b -c /mosquitto/generated/passwd "$username" "$password"
                chmod 0600 /mosquitto/generated/passwd
        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 150Mi
    service:
      app:
        controller: mosquitto
        type: ClusterIP
        ports:
          mqtt:
            port: 1883
    persistence:
      config:
        type: configMap
        name: mosquitto-config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true
          - path: /mosquitto/config/acl
            subPath: acl
            readOnly: true
      auth:
        enabled: true
        type: secret
        name: mosquitto-auth
        globalMounts:
          - path: /mosquitto/auth/username
            subPath: username
            readOnly: true
          - path: /mosquitto/auth/password
            subPath: password
            readOnly: true
      generated:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /mosquitto/generated
      data:
        existingClaim: mosquitto-data
        globalMounts:
          - path: /mosquitto/data
