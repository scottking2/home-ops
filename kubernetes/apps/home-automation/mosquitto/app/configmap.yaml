---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous false
    password_file /mosquitto/generated/passwd
    persistence true
    persistence_location /mosquitto/data
    autosave_interval 1800
    acl_file /mosquitto/config/acl
  acl: |
    user telemetry
    topic readwrite victron/#
    topic readwrite homeassistant/#
    topic readwrite teslamate/#
    topic readwrite royce/#
