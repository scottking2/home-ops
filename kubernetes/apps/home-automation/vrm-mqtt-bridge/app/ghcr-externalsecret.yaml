---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vrm-mqtt-bridge-ghcr
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vrm-mqtt-bridge-ghcr
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"scottking2","password":"{{ .token }}","auth":"{{ printf "scottking2:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: clawdy github container registry
        property: password
