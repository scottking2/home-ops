---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vrm-mqtt-bridge
  namespace: home-automation
  annotations:
    reconcile.fluxcd.io/requestedAt: "2026-04-13T21:16:00-06:00"
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      vrm-mqtt-bridge:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          enableServiceLinks: false
          imagePullSecrets:
            - name: vrm-mqtt-bridge-ghcr
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18.3"
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: vrm-mqtt-bridge-init-db
        containers:
          app:
            image:
              repository: ghcr.io/scottking2/vrm-mqtt-bridge
              tag: "6a45843"
              pullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            env:
              TZ: America/Denver
              LOG_LEVEL: INFO
              LOCAL_MQTT_HOST: mosquitto.home-automation.svc.cluster.local
              LOCAL_MQTT_PORT: "1883"
              LOCAL_MQTT_PREFIX: victron
              LOCAL_MQTT_USERNAME: telemetry
              LOCAL_MQTT_PASSWORD: kW46DuzaWd.DzY4T
              DB_WRITE_INTERVAL: "30"
              VICTRON_INTERNAL_API_BASE_URL: https://stage.lakemates.com
              VICTRON_CONFIG_PULL_ENABLED: "true"
              VICTRON_INTERNAL_API_CONFIG_PATH: /api/internal/victron/config
              VICTRON_INTERNAL_API_INGEST_PATH: /api/internal/victron/ingest
              VICTRON_INTERNAL_API_STATUS_PATH: /api/internal/victron/status
            envFrom:
              - secretRef:
                  name: vrm-mqtt-bridge-secret
              - secretRef:
                  name: vrm-mqtt-bridge-v2-shared
                  optional: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - python
                      - -c
                      - import os; os.path.exists('/tmp/healthy') or exit(1)
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - python
                      - -c
                      - import os; os.path.exists('/tmp/healthy') or exit(1)
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - python
                      - -c
                      - import os; os.path.exists('/tmp/healthy') or exit(1)
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 12
    defaultPodOptions:
      securityContext: {}
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          vrm-mqtt-bridge:
            app:
              - path: /tmp
    service:
      app:
        controller: vrm-mqtt-bridge
        enabled: false
