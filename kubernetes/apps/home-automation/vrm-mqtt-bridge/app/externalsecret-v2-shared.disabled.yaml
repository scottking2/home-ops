---
# Disabled by default to preserve the current stage foundation until the
# `lakemates victron v2 shared` 1Password item exists and the bridge runtime
# has proven the shared-trust-only path end to end.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vrm-mqtt-bridge-v2-shared
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vrm-mqtt-bridge-v2-shared
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: VICTRON_ENCRYPTION_KEY
      remoteRef:
        key: lakemates victron v2 shared
        property: VICTRON_ENCRYPTION_KEY
    - secretKey: VICTRON_BRIDGE_MACHINE_TOKEN
      remoteRef:
        key: lakemates victron v2 shared
        property: VICTRON_BRIDGE_MACHINE_TOKEN
    - secretKey: VICTRON_INTERNAL_API_BASE_URL
      remoteRef:
        key: lakemates victron v2 shared
        property: VICTRON_INTERNAL_API_BASE_URL
