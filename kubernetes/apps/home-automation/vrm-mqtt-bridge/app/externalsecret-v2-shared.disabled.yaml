---
# Disabled by default to preserve the current stage foundation until the
# Tranquility-specific V2 trust contract is confirmed for production.
#
# Current reality: VICTRON_INTERNAL_API_BASE_URL is still effectively
# boat-specific, so the trust item is not truly shared yet.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vrm-mqtt-bridge-v2-shared
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vrm-mqtt-bridge-v2-shared
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: VICTRON_ENCRYPTION_KEY
      remoteRef:
        key: tranquility lakemates victron v2 shared
        property: VICTRON_ENCRYPTION_KEY
    - secretKey: VICTRON_BRIDGE_MACHINE_TOKEN
      remoteRef:
        key: tranquility lakemates victron v2 shared
        property: VICTRON_BRIDGE_MACHINE_TOKEN
    - secretKey: VICTRON_INTERNAL_API_BASE_URL
      remoteRef:
        key: tranquility lakemates victron v2 shared
        property: VICTRON_INTERNAL_API_BASE_URL
