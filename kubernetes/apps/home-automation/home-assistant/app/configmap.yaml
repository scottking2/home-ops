---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config-base
data:
  configuration.yaml: |
    homeassistant:
      name: Home
      unit_system: imperial
      time_zone: America/Denver
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.69.0.0/16
        - 10.0.0.0/24
        - 127.0.0.1
    # Cloudflare edge IPs (required since traffic routes through CF tunnel)
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 141.101.64.0/18
    - 108.162.192.0/18
    - 190.93.240.0/20
    - 188.114.96.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
    - 162.158.0.0/15
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 172.64.0.0/13
    - 131.0.72.0/22
    default_config:

    # Garage door zones (two radii: larger for arrival, smaller for departure)
    zone:
      - name: Near Home
        latitude: 40.0301327
        longitude: -111.6818796
        radius: 75
        icon: mdi:home-map-marker
        passive: false
      - name: Leaving Home
        latitude: 40.0301327
        longitude: -111.6818796
        radius: 50
        icon: mdi:home-export-outline
        passive: false
  automations.yaml: |
    # Garage Door Automations
    # Controlled by: ratgdo32 (cover.ratgdo32_fb826c_door)
    # Triggers: Dark King Tesla + Scott's iPhone + Grace's iPhone
    #
    # Zones used:
    #   zone.near_home    — 75m radius (trigger open when entering)
    #   zone.leaving_home — 50m radius (trigger close when leaving)
    #
    # Time guard: automations disabled 12:00AM – 4:30AM
    #
    # Speed/activity gating on OPEN (prevents false opens when walking):
    #   Tesla:  sensor.tesla_speed > 10 mph (available now)
    #   Phones: sensor.sking_iphone_activity == "automotive" (enable in HA Companion App)
    #
    # Departures are unconditional — any tracked device leaving closes the garage.
    # This covers: Scott walks (Grace home → closes), Grace drives Atlas alone (Scott home → closes).

    # --- OPEN: Tesla arriving (speed-gated) ---
    - id: garage_open_tesla_arriving
      alias: "Garage - Open when Dark King enters near home (speed-gated)"
      description: "Opens garage when Tesla crosses 300m zone at driving speed (>10 mph)"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.tesla_location
          zone: zone.near_home
          event: enter
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "closed"
        # Speed gate — must be driving, not coasting/pushing/parked near boundary
        - condition: numeric_state
          entity_id: sensor.tesla_speed
          above: 10
      action:
        - service: cover.open_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door

    # --- OPEN: Scott's phone arriving (activity-gated) ---
    # Requires "Activity" sensor enabled in HA Companion App → Settings → Manage Sensors
    # Until enabled, this automation will silently not fire (safe default — door stays closed)
    - id: garage_open_scott_phone_arriving
      alias: "Garage - Open when Scott's phone enters near home (automotive only)"
      description: "Opens garage when Scott's iPhone enters 300m zone while in a vehicle"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.sking_iphone
          zone: zone.near_home
          event: enter
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "closed"
        # Activity gate — only open if iPhone thinks you're in a vehicle
        # Enable "Activity" sensor in HA Companion App for this to work
        - condition: state
          entity_id: sensor.sking_iphone_activity
          state: "automotive"
      action:
        - service: cover.open_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door

    # --- CLOSE: Tesla leaving home (PRIMARY) ---
    # Tesla is the primary trigger — closes immediately when it exits 50m zone.
    # No delay: Tesla GPS is very reliable and precise.
    - id: garage_close_tesla_leaving
      alias: "Garage - Close when Dark King leaves home (immediate)"
      description: "Primary trigger: closes immediately when Tesla exits 50m zone"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.tesla_location
          zone: zone.leaving_home
          event: leave
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
      action:
        - repeat:
            count: 10
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
              - service: light.turn_off
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
        - delay: "00:00:03"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        - service: cover.close_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door

    # --- CLOSE: Scott's phone leaving home (SECONDARY) ---
    # Secondary trigger — 1 minute delay to avoid firing when phone is in the Tesla
    # (Tesla automation handles that case). Covers: phone-only trips (Grace driving Atlas,
    # Scott on a walk, etc.) when the Tesla isn't moving.
    - id: garage_close_scott_phone_leaving
      alias: "Garage - Close when Scott's phone leaves home (1-min delay)"
      description: "Secondary trigger: closes 1 min after phone exits 50m zone (Tesla handles Tesla trips)"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.sking_iphone
          zone: zone.leaving_home
          event: leave
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
      action:
        - delay: "00:01:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        - repeat:
            count: 10
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
              - service: light.turn_off
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
        - delay: "00:00:03"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        - service: cover.close_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door

    # --- AUTO-CLOSE: Door left open 45 minutes ---
    # No time guard — if the door is left open at 3am, we still want it to close
    - id: garage_auto_close_45min
      alias: "Garage - Auto-close after 45 minutes open"
      description: "Flashes light at 40 min, closes at 45 min if still open, then sends normal notification"
      mode: single
      trigger:
        - platform: state
          entity_id: cover.ratgdo32_fb826c_door
          to: "open"
          for: "00:40:00"
      condition:
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
      action:
        # === WARNING PHASE (40 min mark) — light flash only, no notification ===
        # Flash opener light 5 times as visual/audible warning
        - repeat:
            count: 5
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay: "00:00:02"
              - service: light.turn_off
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay: "00:00:02"
        - service: light.turn_off
          target:
            entity_id: light.ratgdo32_fb826c_light
        # === 5-MINUTE COUNTDOWN ===
        - delay: "00:05:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        # === FINAL WARNING: 10 blinks + 10 second hold before closing ===
        - repeat:
            count: 10
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
              - service: light.turn_off
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
        - delay: "00:00:03"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        # === CLOSE ===
        - service: cover.close_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door
        - service: notify.mobile_app_sking_iphone
          data:
            title: "🔒 Garage Closed"
            message: "Garage door was closed automatically after 45 minutes."

    # --- OPEN: Grace's phone arriving (activity-gated) ---
    # Requires "Activity" sensor enabled in HA Companion App → Settings → Manage Sensors
    # Until enabled, this automation will silently not fire (safe default — door stays closed)
    - id: garage_open_grace_phone_arriving
      alias: "Garage - Open when Grace's phone enters near home (automotive only)"
      description: "Opens garage when Grace's iPhone enters near home zone while in a vehicle"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.grace_s_iphone
          zone: zone.near_home
          event: enter
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "closed"
        # Activity gate — only open if iPhone thinks you're in a vehicle
        # Enable "Activity" sensor in HA Companion App → Settings → Manage Sensors
        - condition: state
          entity_id: sensor.grace_s_iphone_activity
          state: "automotive"
      action:
        - service: cover.open_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door

    # --- CLOSE: Grace's phone leaving home (SECONDARY) ---
    # Same pattern as Scott's — 1 minute delay to avoid false triggers.
    - id: garage_close_grace_phone_leaving
      alias: "Garage - Close when Grace's phone leaves home (1-min delay)"
      description: "Secondary trigger: closes 1 min after Grace's phone exits leaving_home zone"
      mode: single
      trigger:
        - platform: zone
          entity_id: device_tracker.grace_s_iphone
          zone: zone.leaving_home
          event: leave
      condition:
        - condition: time
          after: "04:30:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
      action:
        - delay: "00:01:00"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        - repeat:
            count: 10
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
              - service: light.turn_off
                target:
                  entity_id: light.ratgdo32_fb826c_light
              - delay:
                  milliseconds: 250
        - delay: "00:00:03"
        - condition: state
          entity_id: cover.ratgdo32_fb826c_door
          state: "open"
        - service: cover.close_cover
          target:
            entity_id: cover.ratgdo32_fb826c_door
