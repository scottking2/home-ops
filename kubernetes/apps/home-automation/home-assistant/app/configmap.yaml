---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config-base
data:
  configuration.yaml: |
    homeassistant:
      name: Home
      unit_system: imperial
      time_zone: America/Denver
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.69.0.0/16
        - 10.0.0.0/24
        - 127.0.0.1
    default_config:

    # Near Home zone for garage door automation (300m radius)
    zone:
      - name: Near Home
        latitude: 40.0301327
        longitude: -111.6818796
        radius: 300
        icon: mdi:home-map-marker
        passive: false
